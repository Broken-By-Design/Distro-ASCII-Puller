<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>distro ascii browser (fastfetch)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1rem;
      background: #0d0d0d;
      color: #c8ffc8;
      font: 13px/1 "Courier New", Courier, monospace;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #0d0d0d;
      padding-bottom: .75rem;
      margin-bottom: .75rem;
      border-bottom: 1px solid #1a1a1a;
    }
    h1 {
      margin: 0 0 .75rem;
      font-size: 1rem;
      color: #5fff5f;
    }
    #search {
      display: block;
      width: 100%;
      padding: .5rem .6rem;
      background: #111;
      border: 1px solid #2a2a2a;
      color: inherit;
      font: inherit;
      outline: none;
    }
    #search:focus { border-color: #5fff5f; }
    #status { padding: 1.5rem 0; color: #666; }
    #count { color: #555; font-size: .8rem; margin-bottom: .6rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: .6rem;
    }
    .card {
      border: 1px solid #1e1e1e;
      background: #111;
      display: flex;
      flex-direction: column;
    }
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
      padding: .35rem .6rem;
      border-bottom: 1px solid #1e1e1e;
    }
    .card-name { color: #5fff5f; font-size: .8rem; }
    .copy {
      flex-shrink: 0;
      background: #181818;
      border: 1px solid #2a2a2a;
      color: #777;
      font: inherit;
      font-size: .75rem;
      padding: .2rem .45rem;
      cursor: pointer;
      line-height: 1.4;
    }
    .copy:hover { color: #c8ffc8; border-color: #444; }
    pre {
      margin: 0;
      padding: .5rem .6rem;
      overflow: auto;
      white-space: pre;
      font: inherit;
      color: #c8ffc8;
      line-height: 1.25;
      flex: 1;
    }
  </style>
</head>
<body>
  <header>
    <h1>// distro ascii browser (fastfetch)</h1>
    <input id="search" type="search" placeholder="filter distros..." autocomplete="off" spellcheck="false">
  </header>
  <p id="status">fetching logos from fastfetch...</p>
  <p id="count" hidden></p>
  <div id="grid" class="grid"></div>

  <script>
    const BUILTIN_URL = 'https://raw.githubusercontent.com/fastfetch-cli/fastfetch/dev/src/logo/builtin.c';
    const ASCII_BASE  = 'https://raw.githubusercontent.com/fastfetch-cli/fastfetch/dev/src/logo/ascii/';

    // Parse builtin.c to extract { name, logoKey } for every logo.
    // Each block has: .names = { "Primary", "Alias", ... } and .lines = FASTFETCH_DATATEXT_LOGO_KEY
    function parseLogos(src) {
      const out  = [];
      const seen = new Set();
      // The {0,400} window covers all fields that may appear between .names and
      // .lines in a builtin.c entry (typically just .type, .names, and .lines).
      const re   = /\.names\s*=\s*\{([^}]+)\}[\s\S]{0,400}?\.lines\s*=\s*FASTFETCH_DATATEXT_LOGO_(\w+)/g;
      let m;
      while ((m = re.exec(src))) {
        const names    = [...m[1].matchAll(/"([^"]+)"/g)].map(q => q[1]);
        const logoKey  = m[2].toLowerCase();
        if (!names.length || seen.has(logoKey)) continue;
        seen.add(logoKey);
        out.push({ name: names[0], logoKey });
      }
      return out.sort((a, b) => a.name.localeCompare(b.name));
    }

    // In-memory cache for fetched ASCII art (null = not found / error).
    const artCache = new Map();

    async function loadArt(logoKey) {
      if (artCache.has(logoKey)) return artCache.get(logoKey);
      try {
        const res = await fetch(ASCII_BASE + logoKey + '.txt');
        if (!res.ok) { artCache.set(logoKey, null); return null; }
        // Strip fastfetch color codes ($1, $2, …, $10, etc.) from art text.
        const art = (await res.text()).replace(/\$\d+/g, '');
        artCache.set(logoKey, art);
        return art;
      } catch {
        artCache.set(logoKey, null);
        return null;
      }
    }

    let ALL = [];
    const statusEl = document.getElementById('status');
    const countEl  = document.getElementById('count');
    const gridEl   = document.getElementById('grid');
    const searchEl = document.getElementById('search');

    // Lazy-load ASCII art as cards scroll into view.
    const observer = new IntersectionObserver((entries) => {
      for (const e of entries) {
        if (!e.isIntersecting) continue;
        const card    = e.target;
        const logoKey = card.dataset.logoKey;
        if (!logoKey || card.dataset.loaded) continue;
        card.dataset.loaded = '1';
        observer.unobserve(card);
        const pre = card.querySelector('pre');
        const btn = card.querySelector('button');
        loadArt(logoKey).then(art => {
          if (art === null) { pre.textContent = '(logo not found)'; return; }
          pre.textContent = art;
          btn.disabled = false;
        });
      }
    }, { rootMargin: '300px' });

    function render(items) {
      gridEl.querySelectorAll('.card').forEach(c => observer.unobserve(c));
      countEl.hidden = false;
      countEl.textContent = items.length + (items.length === 1 ? ' distro' : ' distros');
      gridEl.innerHTML = '';
      for (const d of items) {
        const card = document.createElement('article');
        card.className = 'card';
        card.dataset.logoKey = d.logoKey;

        // If art is already cached fill it right away, otherwise mark for lazy load.
        const cachedArt = artCache.get(d.logoKey);
        if (cachedArt !== undefined) card.dataset.loaded = '1';

        const top = document.createElement('div');
        top.className = 'card-top';

        const nameEl = document.createElement('span');
        nameEl.className = 'card-name';
        nameEl.textContent = d.name;

        const btn = document.createElement('button');
        btn.className = 'copy';
        btn.textContent = 'copy';
        btn.disabled = cachedArt === undefined || cachedArt === null; // disable until art is loaded

        const pre = document.createElement('pre');
        pre.textContent = cachedArt === undefined ? 'loading...' : (cachedArt === null ? '(logo not found)' : cachedArt);

        btn.addEventListener('click', async () => {
          const art = artCache.get(card.dataset.logoKey);
          if (!art) return;
          try {
            await navigator.clipboard.writeText(art);
          } catch {
            const t = document.createElement('textarea');
            t.value = art;
            document.body.appendChild(t);
            t.select();
            document.execCommand('copy');
            t.remove();
          }
          btn.textContent = 'copied!';
          setTimeout(() => { btn.textContent = 'copy'; }, 1200);
        });

        top.append(nameEl, btn);
        card.append(top, pre);
        gridEl.append(card);

        if (!cachedArt) observer.observe(card);
      }
    }

    function filter() {
      const q = searchEl.value.trim().toLowerCase();
      render(q ? ALL.filter(d => d.name.toLowerCase().includes(q)) : ALL);
    }

    searchEl.addEventListener('input', filter);

    fetch(BUILTIN_URL)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(src => { ALL = parseLogos(src); statusEl.remove(); render(ALL); })
      .catch(err => { statusEl.textContent = 'error: ' + err.message; });
  </script>
</body>
</html>
