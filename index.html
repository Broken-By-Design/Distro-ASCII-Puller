<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>distro ascii browser (fastfetch)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1rem;
      background: #0d0d0d;
      color: #c8ffc8;
      font: 13px/1 "Courier New", Courier, monospace;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #0d0d0d;
      padding-bottom: .75rem;
      margin-bottom: .75rem;
      border-bottom: 1px solid #1a1a1a;
    }
    h1 {
      margin: 0 0 .75rem;
      font-size: 1rem;
      color: #5fff5f;
    }
    #search {
      display: block;
      width: 100%;
      padding: .5rem .6rem;
      background: #111;
      border: 1px solid #2a2a2a;
      color: inherit;
      font: inherit;
      outline: none;
    }
    #search:focus { border-color: #5fff5f; }
    #status { padding: 1.5rem 0; color: #666; }
    #count { color: #555; font-size: .8rem; margin-bottom: .6rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: .6rem;
    }
    .card {
      border: 1px solid #1e1e1e;
      background: #111;
      display: flex;
      flex-direction: column;
    }
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
      padding: .35rem .6rem;
      border-bottom: 1px solid #1e1e1e;
    }
    .card-name { color: #5fff5f; font-size: .8rem; }
    .copy {
      flex-shrink: 0;
      background: #181818;
      border: 1px solid #2a2a2a;
      color: #777;
      font: inherit;
      font-size: .75rem;
      padding: .2rem .45rem;
      cursor: pointer;
      line-height: 1.4;
    }
    .copy:hover { color: #c8ffc8; border-color: #444; }
    pre {
      margin: 0;
      padding: .5rem .6rem;
      overflow: auto;
      white-space: pre;
      font: inherit;
      color: #c8ffc8;
      line-height: 1.25;
      flex: 1;
    }
    :root {
      --ansi-black: #1d1f21;
      --ansi-red: #cc6666;
      --ansi-green: #b5bd68;
      --ansi-yellow: #f0c674;
      --ansi-blue: #81a2be;
      --ansi-magenta: #b294bb;
      --ansi-cyan: #8abeb7;
      --ansi-white: #c5c8c6;
      --ansi-bright-black: #666;
      --ansi-bright-red: #ff6b6b;
      --ansi-bright-green: #c6f177;
      --ansi-bright-yellow: #ffe08a;
      --ansi-bright-blue: #8fc7ff;
      --ansi-bright-magenta: #db9cff;
      --ansi-bright-cyan: #7ddcff;
      --ansi-bright-white: #ffffff;
    }
  </style>
</head>
<body>
  <header>
    <h1>// distro ascii browser (fastfetch)</h1>
    <input id="search" type="search" placeholder="filter distros..." autocomplete="off" spellcheck="false">
  </header>
  <p id="status">fetching logos from fastfetch...</p>
  <p id="count" hidden></p>
  <div id="grid" class="grid"></div>

  <script>
    const BUILTIN_URL = 'https://raw.githubusercontent.com/fastfetch-cli/fastfetch/dev/src/logo/builtin.c';
    const ASCII_BASE  = 'https://raw.githubusercontent.com/fastfetch-cli/fastfetch/dev/src/logo/ascii/';
    const PARSE_LINES_WINDOW = 400;
    const PARSE_COLORS_WINDOW = 500;

    // Parse builtin.c to extract { name, logoKey } for every logo.
    // Each block has: .names = { "Primary", "Alias", ... } and .lines = FASTFETCH_DATATEXT_LOGO_KEY
    function parseLogoColors(colorBlock) {
      return [...colorBlock.matchAll(/(FF_COLOR_(?:FG|BG)_[A-Z_0-9]+(?:\s*"[^"]+")?)/g)]
        .map(m => m[1].trim());
    }

    function parseLogos(src) {
      const out  = [];
      const seen = new Set();
      // Windowed matching keeps each match constrained to one builtin.c entry.
      const re   = new RegExp(
        String.raw`\.names\s*=\s*\{([^}]+)\}[\s\S]{0,${PARSE_LINES_WINDOW}}?\.lines\s*=\s*FASTFETCH_DATATEXT_LOGO_(\w+)[\s\S]{0,${PARSE_COLORS_WINDOW}}?\.colors\s*=\s*\{([\s\S]*?)\}`,
        'g',
      );
      let m;
      while ((m = re.exec(src))) {
        const names    = [...m[1].matchAll(/"([^"]+)"/g)].map(q => q[1]);
        const logoKey  = m[2].toLowerCase();
        const colors   = parseLogoColors(m[3]);
        if (!names.length || seen.has(logoKey)) continue;
        seen.add(logoKey);
        out.push({ name: names[0], logoKey, colors });
      }
      return out.sort((a, b) => a.name.localeCompare(b.name));
    }

    // In-memory cache for fetched ASCII art (null = not found / error).
    const artCache = new Map();
    const cardColors = new WeakMap();

    const COLOR_EXPR_TO_CSS = {
      FF_COLOR_FG_BLACK: 'var(--ansi-black)',
      FF_COLOR_FG_RED: 'var(--ansi-red)',
      FF_COLOR_FG_GREEN: 'var(--ansi-green)',
      FF_COLOR_FG_YELLOW: 'var(--ansi-yellow)',
      FF_COLOR_FG_BLUE: 'var(--ansi-blue)',
      FF_COLOR_FG_MAGENTA: 'var(--ansi-magenta)',
      FF_COLOR_FG_CYAN: 'var(--ansi-cyan)',
      FF_COLOR_FG_WHITE: 'var(--ansi-white)',
      FF_COLOR_FG_LIGHT_BLACK: 'var(--ansi-bright-black)',
      FF_COLOR_FG_LIGHT_RED: 'var(--ansi-bright-red)',
      FF_COLOR_FG_LIGHT_GREEN: 'var(--ansi-bright-green)',
      FF_COLOR_FG_LIGHT_YELLOW: 'var(--ansi-bright-yellow)',
      FF_COLOR_FG_LIGHT_BLUE: 'var(--ansi-bright-blue)',
      FF_COLOR_FG_LIGHT_MAGENTA: 'var(--ansi-bright-magenta)',
      FF_COLOR_FG_LIGHT_CYAN: 'var(--ansi-bright-cyan)',
      FF_COLOR_FG_LIGHT_WHITE: 'var(--ansi-bright-white)',
    };

    const COLOR_EXPR_TO_ANSI = {
      FF_COLOR_FG_DEFAULT: '\x1b[39m',
      FF_COLOR_FG_BLACK: '\x1b[30m',
      FF_COLOR_FG_RED: '\x1b[31m',
      FF_COLOR_FG_GREEN: '\x1b[32m',
      FF_COLOR_FG_YELLOW: '\x1b[33m',
      FF_COLOR_FG_BLUE: '\x1b[34m',
      FF_COLOR_FG_MAGENTA: '\x1b[35m',
      FF_COLOR_FG_CYAN: '\x1b[36m',
      FF_COLOR_FG_WHITE: '\x1b[37m',
      FF_COLOR_FG_LIGHT_BLACK: '\x1b[90m',
      FF_COLOR_FG_LIGHT_RED: '\x1b[91m',
      FF_COLOR_FG_LIGHT_GREEN: '\x1b[92m',
      FF_COLOR_FG_LIGHT_YELLOW: '\x1b[93m',
      FF_COLOR_FG_LIGHT_BLUE: '\x1b[94m',
      FF_COLOR_FG_LIGHT_MAGENTA: '\x1b[95m',
      FF_COLOR_FG_LIGHT_CYAN: '\x1b[96m',
      FF_COLOR_FG_LIGHT_WHITE: '\x1b[97m',
    };

    function ansi256ToCss(index) {
      if (!Number.isInteger(index) || index < 0 || index > 255) return null;
      const base = [
        '#000000', '#800000', '#008000', '#808000', '#000080', '#800080', '#008080', '#c0c0c0',
        '#808080', '#ff0000', '#00ff00', '#ffff00', '#0000ff', '#ff00ff', '#00ffff', '#ffffff',
      ];
      if (index < 16) return base[index];
      if (index >= 232) {
        const v = 8 + (index - 232) * 10;
        return `rgb(${v},${v},${v})`;
      }
      const idx = index - 16;
      const r = Math.floor(idx / 36);
      const g = Math.floor((idx % 36) / 6);
      const b = idx % 6;
      const step = [0, 95, 135, 175, 215, 255];
      return `rgb(${step[r]},${step[g]},${step[b]})`;
    }

    function colorExprToCss(expr) {
      if (!expr || expr.startsWith('FF_COLOR_BG_') || expr === 'FF_COLOR_FG_DEFAULT') return null;
      if (COLOR_EXPR_TO_CSS[expr]) return COLOR_EXPR_TO_CSS[expr];
      const m256 = expr.match(/^FF_COLOR_FG_256\s*"(\d{1,3})"$/);
      if (m256) return ansi256ToCss(Number(m256[1]));
      return null;
    }

    function colorExprToAnsi(expr) {
      if (!expr || expr.startsWith('FF_COLOR_BG_')) return '';
      if (COLOR_EXPR_TO_ANSI[expr]) return COLOR_EXPR_TO_ANSI[expr];
      const m256 = expr.match(/^FF_COLOR_FG_256\s*"(\d{1,3})"$/);
      if (m256) return `\x1b[38;5;${Number(m256[1])}m`;
      return '';
    }

    function renderArt(pre, art, colors) {
      const frag = document.createDocumentFragment();
      const tokenRe = /\$(\d+)/g;
      let last = 0;
      let colorExpr = null;
      let m;

      const appendChunk = (chunk, expr) => {
        if (!chunk) return;
        const cssColor = colorExprToCss(expr);
        if (!cssColor) {
          frag.append(document.createTextNode(chunk));
          return;
        }
        const span = document.createElement('span');
        span.style.color = cssColor;
        span.textContent = chunk;
        frag.append(span);
      };

      while ((m = tokenRe.exec(art))) {
        appendChunk(art.slice(last, m.index), colorExpr);
        const index = Number(m[1]);
        if (index === 0) colorExpr = null;
        else if (index > 0 && index <= colors.length) colorExpr = colors[index - 1] || colorExpr;
        last = tokenRe.lastIndex;
      }
      appendChunk(art.slice(last), colorExpr);
      pre.replaceChildren(frag);
    }

    function artToAnsi(art, colors) {
      const out = art.replace(/\$(\d+)/g, (_, raw) => {
        const index = Number(raw);
        if (index === 0) return '\x1b[0m';
        if (index > 0 && index <= colors.length) return colorExprToAnsi(colors[index - 1]);
        return '';
      });
      return out + '\x1b[0m';
    }

    async function loadArt(logoKey) {
      if (artCache.has(logoKey)) return artCache.get(logoKey);
      try {
        const res = await fetch(ASCII_BASE + logoKey + '.txt');
        if (!res.ok) { artCache.set(logoKey, null); return null; }
        const art = await res.text();
        artCache.set(logoKey, art);
        return art;
      } catch {
        artCache.set(logoKey, null);
        return null;
      }
    }

    let ALL = [];
    const statusEl = document.getElementById('status');
    const countEl  = document.getElementById('count');
    const gridEl   = document.getElementById('grid');
    const searchEl = document.getElementById('search');

    // Lazy-load ASCII art as cards scroll into view.
    const observer = new IntersectionObserver((entries) => {
      for (const e of entries) {
        if (!e.isIntersecting) continue;
        const card    = e.target;
        const logoKey = card.dataset.logoKey;
        if (!logoKey || card.dataset.loaded) continue;
        card.dataset.loaded = '1';
        observer.unobserve(card);
        const pre = card.querySelector('pre');
        const btn = card.querySelector('button');
        loadArt(logoKey).then(art => {
          if (art === null) { pre.textContent = '(logo not found)'; return; }
          renderArt(pre, art, cardColors.get(card) || []);
          btn.disabled = false;
        });
      }
    }, { rootMargin: '300px' });

    function render(items) {
      gridEl.querySelectorAll('.card').forEach(c => observer.unobserve(c));
      countEl.hidden = false;
      countEl.textContent = items.length + (items.length === 1 ? ' distro' : ' distros');
      gridEl.innerHTML = '';
      for (const d of items) {
        const card = document.createElement('article');
        card.className = 'card';
        card.dataset.logoKey = d.logoKey;
        cardColors.set(card, d.colors);

        // If art is already cached fill it right away, otherwise mark for lazy load.
        const cachedArt = artCache.get(d.logoKey);
        if (cachedArt !== undefined) card.dataset.loaded = '1';

        const top = document.createElement('div');
        top.className = 'card-top';

        const nameEl = document.createElement('span');
        nameEl.className = 'card-name';
        nameEl.textContent = d.name;

        const btn = document.createElement('button');
        btn.className = 'copy';
        btn.textContent = 'copy';
        btn.disabled = cachedArt === undefined || cachedArt === null; // disable until art is loaded

        const pre = document.createElement('pre');
        if (cachedArt === undefined) pre.textContent = 'loading...';
        else if (cachedArt === null) pre.textContent = '(logo not found)';
        else renderArt(pre, cachedArt, d.colors);

        btn.addEventListener('click', async () => {
          const art = artCache.get(card.dataset.logoKey);
          if (!art) return;
          const ansiArt = artToAnsi(art, d.colors);
          try {
            await navigator.clipboard.writeText(ansiArt);
          } catch {
            const t = document.createElement('textarea');
            t.value = ansiArt;
            document.body.appendChild(t);
            t.select();
            document.execCommand('copy');
            t.remove();
          }
          btn.textContent = 'copied!';
          setTimeout(() => { btn.textContent = 'copy'; }, 1200);
        });

        top.append(nameEl, btn);
        card.append(top, pre);
        gridEl.append(card);

        if (cachedArt === undefined) observer.observe(card);
      }
    }

    function filter() {
      const q = searchEl.value.trim().toLowerCase();
      render(q ? ALL.filter(d => d.name.toLowerCase().includes(q)) : ALL);
    }

    searchEl.addEventListener('input', filter);

    fetch(BUILTIN_URL)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(src => { ALL = parseLogos(src); statusEl.remove(); render(ALL); })
      .catch(err => { statusEl.textContent = 'error: ' + err.message; });
  </script>
</body>
</html>
