<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>distro ascii browser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1rem;
      background: #0d0d0d;
      color: #c8ffc8;
      font: 13px/1 "Courier New", Courier, monospace;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #0d0d0d;
      padding-bottom: .75rem;
      margin-bottom: .75rem;
      border-bottom: 1px solid #1a1a1a;
    }
    h1 {
      margin: 0 0 .75rem;
      font-size: 1rem;
      color: #5fff5f;
    }
    #search {
      display: block;
      width: 100%;
      padding: .5rem .6rem;
      background: #111;
      border: 1px solid #2a2a2a;
      color: inherit;
      font: inherit;
      outline: none;
    }
    #search:focus { border-color: #5fff5f; }
    #status { padding: 1.5rem 0; color: #666; }
    #count { color: #555; font-size: .8rem; margin-bottom: .6rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: .6rem;
    }
    .card {
      border: 1px solid #1e1e1e;
      background: #111;
      display: flex;
      flex-direction: column;
    }
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
      padding: .35rem .6rem;
      border-bottom: 1px solid #1e1e1e;
    }
    .card-name { color: #5fff5f; font-size: .8rem; }
    .copy {
      flex-shrink: 0;
      background: #181818;
      border: 1px solid #2a2a2a;
      color: #777;
      font: inherit;
      font-size: .75rem;
      padding: .2rem .45rem;
      cursor: pointer;
      line-height: 1.4;
    }
    .copy:hover { color: #c8ffc8; border-color: #444; }
    pre {
      margin: 0;
      padding: .5rem .6rem;
      overflow: auto;
      white-space: pre;
      font: inherit;
      color: #c8ffc8;
      line-height: 1.25;
      flex: 1;
    }
  </style>
</head>
<body>
  <header>
    <h1>// distro ascii browser</h1>
    <input id="search" type="search" placeholder="filter distros..." autocomplete="off" spellcheck="false">
  </header>
  <p id="status">fetching logos from neofetch...</p>
  <p id="count" hidden></p>
  <div id="grid" class="grid"></div>

  <script>
    const SOURCE = 'https://raw.githubusercontent.com/dylanaraps/neofetch/master/neofetch';

    const WANT = [
      { name: 'Arch Linux',  key: 'Arch'       },
      { name: 'Ubuntu',      key: 'Ubuntu'      },
      { name: 'Debian',      key: 'Debian'      },
      { name: 'Fedora',      key: 'Fedora'      },
      { name: 'Manjaro',     key: 'Manjaro'     },
      { name: 'Linux Mint',  key: 'Linux Mint'  },
      { name: 'openSUSE',    key: 'openSUSE'    },
      { name: 'Kali Linux',  key: 'Kali'        },
      { name: 'Pop!_OS',     key: 'Pop!_OS'     },
      { name: 'CentOS',      key: 'CentOS'      },
      { name: 'Void Linux',  key: 'Void'        },
      { name: 'Alpine',      key: 'Alpine'      },
      { name: 'NixOS',       key: 'NixOS'       },
      { name: 'Gentoo',      key: 'Gentoo'      },
    ];

    function parseArt(src) {
      return WANT.map(({ name, key }) => {
        const esc = key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const re = new RegExp(
          '"' + esc + '"\\*[^\\n]*\\)[\\s\\S]*?' +
          "read -rd '' ascii_data <<'EOF'\\n([\\s\\S]*?)\\nEOF"
        );
        const m = re.exec(src);
        if (!m) return null;
        const art = m[1].replace(/\$\{c\d+\}/g, '');
        return { name, art };
      }).filter(Boolean);
    }

    let ALL = [];
    const statusEl = document.getElementById('status');
    const countEl  = document.getElementById('count');
    const gridEl   = document.getElementById('grid');
    const searchEl = document.getElementById('search');

    function render(items) {
      countEl.hidden = false;
      countEl.textContent = items.length + (items.length === 1 ? ' distro' : ' distros');
      gridEl.innerHTML = '';
      for (const d of items) {
        const card = document.createElement('article');
        card.className = 'card';

        const top = document.createElement('div');
        top.className = 'card-top';

        const nameEl = document.createElement('span');
        nameEl.className = 'card-name';
        nameEl.textContent = d.name;

        const btn = document.createElement('button');
        btn.className = 'copy';
        btn.textContent = 'copy';

        const pre = document.createElement('pre');
        pre.textContent = d.art;

        btn.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(d.art);
          } catch {
            const t = document.createElement('textarea');
            t.value = d.art;
            document.body.appendChild(t);
            t.select();
            document.execCommand('copy');
            t.remove();
          }
          btn.textContent = 'copied!';
          setTimeout(() => { btn.textContent = 'copy'; }, 1200);
        });

        top.append(nameEl, btn);
        card.append(top, pre);
        gridEl.append(card);
      }
    }

    function filter() {
      const q = searchEl.value.trim().toLowerCase();
      render(q ? ALL.filter(d => d.name.toLowerCase().includes(q)) : ALL);
    }

    searchEl.addEventListener('input', filter);

    fetch(SOURCE)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(src => { ALL = parseArt(src); statusEl.remove(); render(ALL); })
      .catch(err => { statusEl.textContent = 'error: ' + err.message; });
  </script>
</body>
</html>
