<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Distro ASCII Browser</title>
  <style>
    :root {
      --bg: #0b0f10;
      --panel: #13191c;
      --text: #c7f9cc;
      --muted: #7fa18a;
      --border: #213137;
      --accent: #50fa7b;
      --btn: #1c282d;
      --btn-hover: #26363d;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    .search-wrap { position: sticky; top: 0; padding-bottom: 14px; background: linear-gradient(var(--bg), var(--bg) 80%, transparent); z-index: 2; }
    #search {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0f1417;
      color: var(--text);
      outline: none;
      font: inherit;
    }
    #search:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 14px;
    }
    .card {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      overflow: hidden;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .name { margin: 0; font-size: 14px; color: var(--muted); }
    .copy-btn {
      border: 1px solid var(--border);
      background: var(--btn);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
    }
    .copy-btn:hover { background: var(--btn-hover); }
    pre {
      margin: 0;
      padding: 12px;
      white-space: pre;
      overflow: auto;
      line-height: 1.2;
      font: inherit;
      color: var(--text);
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Search distros..." autocomplete="off" />
    </div>
    <section id="grid" class="grid" aria-live="polite"></section>
  </div>

    const grid = document.getElementById('grid');
    const searchInput = document.getElementById('search');

    function render(items) {
      grid.innerHTML = '';
      for (const distro of items) {
        const card = document.createElement('article');
        card.className = 'card';

        const header = document.createElement('div');
        header.className = 'card-header';

        const title = document.createElement('h2');
        title.className = 'name';
        title.textContent = distro.name;

        const button = document.createElement('button');
        button.className = 'copy-btn';
        button.type = 'button';
        button.textContent = 'Copy';

        const pre = document.createElement('pre');
        pre.textContent = distro.art;

        button.addEventListener('click', async () => {
          const original = button.textContent;
          try {
            await navigator.clipboard.writeText(distro.art);
          } catch {
            const ta = document.createElement('textarea');
            ta.value = distro.art;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            ta.remove();
          }
          button.textContent = 'Copied!';
          setTimeout(() => { button.textContent = original; }, 1000);
        });

        header.append(title, button);
        card.append(header, pre);
        grid.append(card);
      }
    }

    function filter() {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) {
        render(distros);
        return;
      }
      render(distros.filter((d) => d.name.toLowerCase().includes(q)));
    }

    searchInput.addEventListener('input', filter);
    render(distros);
  </script>
</body>
</html>
